# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages co

on:
  push:
    branches: [ main ]

jobs:
  build: 

    runs-on: self-hosted
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Copy files
      run:  cp -r /home/noteshq/ci/_work/noteshq-landing/noteshq-landing/*.*  /home/noteshq/
    - name: Copy save
      run:  cp -r /home/noteshq/ci/_work/noteshq-landing/noteshq-landing/assets/*.png  /home/noteshq/assets/
