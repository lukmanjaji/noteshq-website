# ──────────────────────────────────────────────────────────────────
# noteshq.ai — nginx server config
#
# Drop this in /etc/nginx/sites-available/noteshq.ai on the VPS,
# symlink it into sites-enabled, then:
#
#   sudo nginx -t                  # syntax check
#   sudo systemctl reload nginx    # apply
#
# TLS certs come from Let's Encrypt via certbot — run once after
# the first deploy to mint them:
#
#   sudo certbot --nginx -d noteshq.ai -d www.noteshq.ai
#
# Certbot edits this file in place to add the ssl_certificate lines
# + the HTTP→HTTPS redirect. Until that's run, only the HTTP block
# below is active.
#
# Files are expected at /var/www/noteshq.ai (adjust the `root`
# directive below if your deploy path differs).
# ──────────────────────────────────────────────────────────────────

# ── HTTP (port 80) ────────────────────────────────────────────────
# Certbot adds an HTTPS redirect here after issuing the cert;
# before that, this block serves the site directly so the
# initial certbot challenge over HTTP can succeed.
server {
    listen 80;
    listen [::]:80;
    server_name noteshq.ai www.noteshq.ai;

    root /var/www/noteshq.ai;
    index index.html;

    # Body size — defensively low for a static-only host.
    client_max_body_size 1m;

    # gzip on text payloads. The static-html pages compress ~70%.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── www → apex 301 ───────────────────────────────────────────
    # Pick one canonical hostname and 301 the other. Apex (noteshq.ai)
    # is the canonical here — shorter, matches the brand. Search
    # engines collapse the link equity into one URL this way.
    if ($host = www.noteshq.ai) {
        return 301 $scheme://noteshq.ai$request_uri;
    }

    # ── 404 handler ──────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        # Internal-only so a direct GET /404.html still returns
        # the correct status code (404), not 200. Marking it
        # internal means nginx will only render it during error
        # handling, not in response to a direct request.
        internal;
    }

    # ── Static asset cache ───────────────────────────────────────
    # Long-cache fingerprinted assets (anything under /assets/).
    # HTML pages stay short-cache so a deploy is visible within
    # minutes, not hours, even if the user has a stale tab open.
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|webp|avif|gif|ico|svg)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── .well-known passthrough ─────────────────────────────────
    # Needed by:
    #   /.well-known/acme-challenge/   → certbot HTTP-01 cert renewal
    #   /.well-known/assetlinks.json   → Android App Links verification
    #                                    (used by the digest email's
    #                                    "Open NotesHQ" deep-link to
    #                                    hand control to the mobile app)
    # Served as a plain file with the correct Content-Type so
    # Android's verifier accepts it.
    location /.well-known/ {
        default_type "application/json";
        try_files $uri =404;
    }

    # ── Default catch-all ────────────────────────────────────────
    # Try the requested path, then add .html (so "/pricing"
    # resolves to "/pricing.html"), then 404. The trailing =404
    # is what flips the status code on a real miss — without it,
    # nginx would return the configured error_page with a 200.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Don't leak sensitive dotfiles (.git, .env, .htaccess from
    # the Apache fallback config we also ship). Apache's
    # .htaccess is harmless if served but pointless on nginx.
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}

# ── HTTPS (port 443) ──────────────────────────────────────────────
# This block is added by certbot the first time you run it.
# Left commented here as a reference so you know what to expect.
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name noteshq.ai www.noteshq.ai;
#
#     ssl_certificate     /etc/letsencrypt/live/noteshq.ai/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/noteshq.ai/privkey.pem;
#     include             /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
#
#     # Everything else (root, error_page, gzip, locations) is
#     # identical to the HTTP block above — duplicate it here,
#     # or factor into an include file under conf.d/.
# }
